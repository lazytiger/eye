openapi: 3.1.0
info:
  title: OpenRouter API
  version: 1.0.0
  description: OpenAI-compatible API with additional OpenRouter features
  contact:
    name: OpenRouter Support
    url: https://openrouter.ai/docs
    email: support@openrouter.ai
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
servers:
  - url: https://openrouter.ai/api/v1
    description: Production server
    x-speakeasy-server-id: production
security:
  - apiKey: [ ]
externalDocs:
  description: OpenRouter Documentation
  url: https://openrouter.ai/docs
components:
  schemas:
    ReasoningSummaryVerbosity:
      type: string
      nullable: true
      enum:
        - auto
        - concise
        - detailed
      x-speakeasy-unknown-values: allow
    DataCollection:
      type: string
      nullable: true
      enum:
        - deny
        - allow
      description: |-
        Data collection setting. If no available model provider meets the requirement, your request will return an error.
        - allow: (default) allow providers which store user data non-transiently and may train on it

        - deny: use only providers which do not collect user data.
      x-speakeasy-unknown-values: allow
    ProviderName:
      type: string
      enum:
        - AI21
        - AionLabs
        - Alibaba
        - Ambient
        - Amazon Bedrock
        - Amazon Nova
        - Anthropic
        - Arcee AI
        - AtlasCloud
        - Avian
        - Azure
        - BaseTen
        - BytePlus
        - Black Forest Labs
        - Cerebras
        - Chutes
        - Cirrascale
        - Clarifai
        - Cloudflare
        - Cohere
        - Crusoe
        - DeepInfra
        - DeepSeek
        - Featherless
        - Fireworks
        - Friendli
        - GMICloud
        - Google
        - Google AI Studio
        - Groq
        - Hyperbolic
        - Inception
        - Inceptron
        - InferenceNet
        - Ionstream
        - Infermatic
        - Io Net
        - Inflection
        - Liquid
        - Mara
        - Mancer 2
        - Minimax
        - ModelRun
        - Mistral
        - Modular
        - Moonshot AI
        - Morph
        - NCompass
        - Nebius
        - NextBit
        - Novita
        - Nvidia
        - OpenAI
        - OpenInference
        - Parasail
        - Perplexity
        - Phala
        - Relace
        - SambaNova
        - Seed
        - SiliconFlow
        - Sourceful
        - StepFun
        - Stealth
        - StreamLake
        - Switchpoint
        - Together
        - Upstage
        - Venice
        - WandB
        - Xiaomi
        - xAI
        - Z.AI
        - FakeProvider
      x-speakeasy-unknown-values: allow
    Quantization:
      type: string
      enum:
        - int4
        - int8
        - fp4
        - fp6
        - fp8
        - fp16
        - bf16
        - fp32
        - unknown
      x-speakeasy-unknown-values: allow
    ProviderSort:
      type: string
      enum:
        - price
        - throughput
        - latency
      description: The provider sorting strategy (price, throughput, latency)
      x-speakeasy-unknown-values: allow
    ProviderSortConfig:
      type: object
      properties:
        by:
          type: string
          nullable: true
          enum:
            - price
            - throughput
            - latency
          description: The provider sorting strategy (price, throughput, latency)
          x-speakeasy-unknown-values: allow
        partition:
          type: string
          nullable: true
          enum:
            - model
            - none
          description: 'Partitioning strategy for sorting: "model" (default) groups endpoints by model before sorting (fallback models remain fallbacks), "none" sorts all endpoints together regardless of model.'
          x-speakeasy-unknown-values: allow
      description: The provider sorting strategy (price, throughput, latency)
    BigNumberUnion:
      type: string
      description: Price per million prompt tokens
    PercentileThroughputCutoffs:
      type: object
      properties:
        p50:
          type: number
          nullable: true
          description: Minimum p50 throughput (tokens/sec)
        p75:
          type: number
          nullable: true
          description: Minimum p75 throughput (tokens/sec)
        p90:
          type: number
          nullable: true
          description: Minimum p90 throughput (tokens/sec)
        p99:
          type: number
          nullable: true
          description: Minimum p99 throughput (tokens/sec)
      description: Percentile-based throughput cutoffs. All specified cutoffs must be met for an endpoint to be preferred.
    PreferredMinThroughput:
      anyOf:
        - type: number
        - $ref: '#/components/schemas/PercentileThroughputCutoffs'
        - nullable: true
      description: Preferred minimum throughput (in tokens per second). Can be a number (applies to p50) or an object with percentile-specific cutoffs. Endpoints below the threshold(s) may still be used, but are deprioritized in routing. When using fallback models, this may cause a fallback model to be used instead of the primary model if it meets the threshold.
    PercentileLatencyCutoffs:
      type: object
      properties:
        p50:
          type: number
          nullable: true
          description: Maximum p50 latency (seconds)
        p75:
          type: number
          nullable: true
          description: Maximum p75 latency (seconds)
        p90:
          type: number
          nullable: true
          description: Maximum p90 latency (seconds)
        p99:
          type: number
          nullable: true
          description: Maximum p99 latency (seconds)
      description: Percentile-based latency cutoffs. All specified cutoffs must be met for an endpoint to be preferred.
    PreferredMaxLatency:
      anyOf:
        - type: number
        - $ref: '#/components/schemas/PercentileLatencyCutoffs'
        - nullable: true
      description: Preferred maximum latency (in seconds). Can be a number (applies to p50) or an object with percentile-specific cutoffs. Endpoints above the threshold(s) may still be used, but are deprioritized in routing. When using fallback models, this may cause a fallback model to be used instead of the primary model if it meets the threshold.
    WebSearchEngine:
      type: string
      enum:
        - native
        - exa
      description: The search engine to use for web search.
      x-speakeasy-unknown-values: allow
    PDFParserEngine:
      type: string
      enum:
        - mistral-ocr
        - pdf-text
        - native
      description: The engine to use for parsing PDF files.
      x-speakeasy-unknown-values: allow
    PDFParserOptions:
      type: object
      properties:
        engine:
          $ref: '#/components/schemas/PDFParserEngine'
      description: Options for PDF parsing.
    ChatCompletionFinishReason:
      type: string
      enum:
        - tool_calls
        - stop
        - length
        - content_filter
        - error
      x-speakeasy-unknown-values: allow
    ChatMessageContentItemCacheControl:
      type: object
      properties:
        type:
          type: string
          enum:
            - ephemeral
        ttl:
          type: string
          enum:
            - 5m
            - 1h
          x-speakeasy-unknown-values: allow
      required:
        - type
      description: Cache control for the content part
    ChatMessageContentItemText:
      type: object
      properties:
        type:
          type: string
          enum:
            - text
        text:
          type: string
        cache_control:
          $ref: '#/components/schemas/ChatMessageContentItemCacheControl'
      required:
        - type
        - text
      description: Text content part
    ChatMessageContentItemImage:
      type: object
      properties:
        type:
          type: string
          enum:
            - image_url
        image_url:
          type: object
          properties:
            url:
              type: string
              description: 'URL of the image (data: URLs supported)'
            detail:
              type: string
              enum:
                - auto
                - low
                - high
              description: Image detail level for vision models
              x-speakeasy-unknown-values: allow
          required:
            - url
      required:
        - type
        - image_url
      description: Image content part for vision models
    ChatMessageContentItemAudio:
      type: object
      properties:
        type:
          type: string
          enum:
            - input_audio
        input_audio:
          type: object
          properties:
            data:
              type: string
              description: Base64 encoded audio data
            format:
              type: string
              description: Audio format (e.g., wav, mp3, flac, m4a, ogg, aiff, aac, pcm16, pcm24). Supported formats vary by provider.
          required:
            - data
            - format
      required:
        - type
        - input_audio
      description: Audio input content part. Supported audio formats vary by provider.
    VideoInput:
      type: object
      properties:
        url:
          type: string
          description: 'URL of the video (data: URLs supported)'
      required:
        - url
      description: Video input object
    ChatMessageContentItemVideoLegacy:
      type: object
      properties:
        type:
          type: string
          enum:
            - input_video
        video_url:
          $ref: '#/components/schemas/VideoInput'
      required:
        - type
        - video_url
      description: Video input content part (legacy format - deprecated)
      deprecated: true
    ChatMessageContentItemVideo:
      type: object
      properties:
        type:
          type: string
          enum:
            - video_url
        video_url:
          $ref: '#/components/schemas/VideoInput'
      required:
        - type
        - video_url
      description: Video input content part
    ChatMessageContentItemFile:
      type: object
      properties:
        type:
          type: string
          enum:
            - file
        file:
          type: object
          properties:
            file_data:
              type: string
              description: File content as base64 data URL or URL
            file_id:
              type: string
              description: File ID for previously uploaded files
            filename:
              type: string
              description: Original filename
      required:
        - type
        - file
      description: File content part for document processing
    ChatMessageContentItem:
      oneOf:
        - $ref: '#/components/schemas/ChatMessageContentItemText'
        - $ref: '#/components/schemas/ChatMessageContentItemImage'
        - $ref: '#/components/schemas/ChatMessageContentItemAudio'
        - oneOf:
            - $ref: '#/components/schemas/ChatMessageContentItemVideoLegacy'
            - $ref: '#/components/schemas/ChatMessageContentItemVideo'
          discriminator:
            propertyName: type
            mapping:
              input_video: '#/components/schemas/ChatMessageContentItemVideoLegacy'
              video_url: '#/components/schemas/ChatMessageContentItemVideo'
        - $ref: '#/components/schemas/ChatMessageContentItemFile'
      discriminator:
        propertyName: type
      description: Content part for chat completion messages
    ChatMessageToolCall:
      type: object
      properties:
        id:
          type: string
          description: Tool call identifier
        type:
          type: string
          enum:
            - function
        function:
          type: object
          properties:
            name:
              type: string
              description: Function name to call
            arguments:
              type: string
              description: Function arguments as JSON string
          required:
            - name
            - arguments
      required:
        - id
        - type
        - function
      description: Tool call made by the assistant
    ReasoningDetailSummary:
      type: object
      properties:
        type:
          type: string
          enum:
            - reasoning.summary
        summary:
          type: string
        id:
          type: string
          nullable: true
        format:
          type: string
          nullable: true
          enum:
            - unknown
            - openai-responses-v1
            - azure-openai-responses-v1
            - xai-responses-v1
            - anthropic-claude-v1
            - google-gemini-v1
          x-speakeasy-unknown-values: allow
        index:
          type: number
      required:
        - type
        - summary
      description: Reasoning detail summary schema
    ReasoningDetailEncrypted:
      type: object
      properties:
        type:
          type: string
          enum:
            - reasoning.encrypted
        data:
          type: string
        id:
          type: string
          nullable: true
        format:
          type: string
          nullable: true
          enum:
            - unknown
            - openai-responses-v1
            - azure-openai-responses-v1
            - xai-responses-v1
            - anthropic-claude-v1
            - google-gemini-v1
          x-speakeasy-unknown-values: allow
        index:
          type: number
      required:
        - type
        - data
      description: Reasoning detail encrypted schema
    ReasoningDetailText:
      type: object
      properties:
        type:
          type: string
          enum:
            - reasoning.text
        text:
          type: string
          nullable: true
        signature:
          type: string
          nullable: true
        id:
          type: string
          nullable: true
        format:
          type: string
          nullable: true
          enum:
            - unknown
            - openai-responses-v1
            - azure-openai-responses-v1
            - xai-responses-v1
            - anthropic-claude-v1
            - google-gemini-v1
          x-speakeasy-unknown-values: allow
        index:
          type: number
      required:
        - type
      description: Reasoning detail text schema
    ReasoningDetailUnion:
      oneOf:
        - $ref: '#/components/schemas/ReasoningDetailSummary'
        - $ref: '#/components/schemas/ReasoningDetailEncrypted'
        - $ref: '#/components/schemas/ReasoningDetailText'
      discriminator:
        propertyName: type
        mapping:
          reasoning.summary: '#/components/schemas/ReasoningDetailSummary'
          reasoning.encrypted: '#/components/schemas/ReasoningDetailEncrypted'
          reasoning.text: '#/components/schemas/ReasoningDetailText'
      description: Reasoning detail union schema
    AssistantMessageReasoningDetails:
      type: array
      items:
        $ref: '#/components/schemas/ReasoningDetailUnion'
      description: Reasoning details for extended thinking models
    AssistantMessageImages:
      type: array
      items:
        type: object
        properties:
          image_url:
            type: object
            properties:
              url:
                type: string
                description: URL or base64-encoded data of the generated image
            required:
              - url
        required:
          - image_url
      description: Generated images from image generation models
    ChatCompletionAudioOutput:
      type: object
      properties:
        id:
          type: string
          description: Audio output identifier
        expires_at:
          type: number
          description: Audio expiration timestamp
        data:
          type: string
          description: Base64 encoded audio data
        transcript:
          type: string
          description: Audio transcript
      description: Audio output data or reference
    AssistantMessage:
      type: object
      properties:
        role:
          type: string
          enum:
            - assistant
        content:
          anyOf:
            - type: string
            - type: array
              items:
                $ref: '#/components/schemas/ChatMessageContentItem'
            - nullable: true
          description: Assistant message content
        name:
          type: string
          description: Optional name for the assistant
        tool_calls:
          type: array
          items:
            $ref: '#/components/schemas/ChatMessageToolCall'
          description: Tool calls made by the assistant
        refusal:
          type: string
          nullable: true
          description: Refusal message if content was refused
        reasoning:
          type: string
          nullable: true
          description: Reasoning output
        reasoning_details:
          $ref: '#/components/schemas/AssistantMessageReasoningDetails'
        images:
          $ref: '#/components/schemas/AssistantMessageImages'
        audio:
          $ref: '#/components/schemas/ChatCompletionAudioOutput'
        phase:
          anyOf:
            - type: string
              enum:
                - commentary
            - type: string
              enum:
                - final_answer
            - nullable: true
          description: The phase of an assistant message. Use `commentary` for an intermediate assistant message and `final_answer` for the final assistant message. For follow-up requests with models like `gpt-5.3-codex` and later, preserve and resend phase on all assistant messages. Omitting it can degrade performance. Not used for user messages.
      required:
        - role
      description: Assistant message for requests and responses
    ChatMessageTokenLogprob:
      type: object
      properties:
        token:
          type: string
          description: The token
        logprob:
          type: number
          description: Log probability of the token
        bytes:
          type: array
          nullable: true
          items:
            type: number
          description: UTF-8 bytes of the token
        top_logprobs:
          type: array
          items:
            type: object
            properties:
              token:
                type: string
              logprob:
                type: number
              bytes:
                type: array
                nullable: true
                items:
                  type: number
            required:
              - token
              - logprob
              - bytes
          description: Top alternative tokens with probabilities
      required:
        - token
        - logprob
        - bytes
        - top_logprobs
      description: Token log probability information
    ChatMessageTokenLogprobs:
      type: object
      nullable: true
      properties:
        content:
          type: array
          nullable: true
          items:
            $ref: '#/components/schemas/ChatMessageTokenLogprob'
          description: Log probabilities for content tokens
        refusal:
          type: array
          nullable: true
          items:
            $ref: '#/components/schemas/ChatMessageTokenLogprob'
          description: Log probabilities for refusal tokens
      required:
        - content
      description: Log probabilities for the completion
    ChatResponseChoice:
      type: object
      properties:
        finish_reason:
          anyOf:
            - $ref: '#/components/schemas/ChatCompletionFinishReason'
            - nullable: true
            - nullable: true
        index:
          type: number
          description: Choice index
        message:
          $ref: '#/components/schemas/AssistantMessage'
        logprobs:
          $ref: '#/components/schemas/ChatMessageTokenLogprobs'
      required:
        - finish_reason
        - index
        - message
      description: Chat completion choice
    ChatGenerationTokenUsage:
      type: object
      properties:
        completion_tokens:
          type: number
          description: Number of tokens in the completion
        prompt_tokens:
          type: number
          description: Number of tokens in the prompt
        total_tokens:
          type: number
          description: Total number of tokens
        completion_tokens_details:
          type: object
          nullable: true
          properties:
            reasoning_tokens:
              type: number
              nullable: true
              description: Tokens used for reasoning
            audio_tokens:
              type: number
              nullable: true
              description: Tokens used for audio output
            accepted_prediction_tokens:
              type: number
              nullable: true
              description: Accepted prediction tokens
            rejected_prediction_tokens:
              type: number
              nullable: true
              description: Rejected prediction tokens
          description: Detailed completion token usage
        prompt_tokens_details:
          type: object
          nullable: true
          properties:
            cached_tokens:
              type: number
              description: Cached prompt tokens
            cache_write_tokens:
              type: number
              description: Tokens written to cache. Only returned for models with explicit caching and cache write pricing.
            audio_tokens:
              type: number
              description: Audio input tokens
            video_tokens:
              type: number
              description: Video input tokens
          description: Detailed prompt token usage
      required:
        - completion_tokens
        - prompt_tokens
        - total_tokens
      description: Token usage statistics
    ChatResponse:
      type: object
      properties:
        id:
          type: string
          description: Unique completion identifier
        choices:
          type: array
          items:
            $ref: '#/components/schemas/ChatResponseChoice'
          description: List of completion choices
        created:
          type: number
          description: Unix timestamp of creation
        model:
          type: string
          description: Model used for completion
        object:
          type: string
          enum:
            - chat.completion
        system_fingerprint:
          type: string
          nullable: true
          description: System fingerprint
        usage:
          $ref: '#/components/schemas/ChatGenerationTokenUsage'
      required:
        - id
        - choices
        - created
        - model
        - object
        - system_fingerprint
      description: Chat completion response
    ChatStreamingMessageToolCall:
      type: object
      properties:
        index:
          type: number
          description: Tool call index in the array
        id:
          type: string
          description: Tool call identifier
        type:
          type: string
          enum:
            - function
          description: Tool call type
        function:
          type: object
          properties:
            name:
              type: string
              description: Function name
            arguments:
              type: string
              description: Function arguments as JSON string
          description: Function call details
      required:
        - index
      description: Tool call delta for streaming responses
    ChatStreamingMessageChunk:
      type: object
      properties:
        role:
          type: string
          enum:
            - assistant
          description: The role of the message author
        content:
          type: string
          nullable: true
          description: Message content delta
        reasoning:
          type: string
          nullable: true
          description: Reasoning content delta
        refusal:
          type: string
          nullable: true
          description: Refusal message delta
        tool_calls:
          type: array
          items:
            $ref: '#/components/schemas/ChatStreamingMessageToolCall'
          description: Tool calls delta
        reasoning_details:
          $ref: '#/components/schemas/AssistantMessageReasoningDetails'
        audio:
          allOf:
            - $ref: '#/components/schemas/ChatCompletionAudioOutput'
            - description: Audio output data
        phase:
          anyOf:
            - type: string
              enum:
                - commentary
            - type: string
              enum:
                - final_answer
            - nullable: true
          description: The phase of an assistant message. Use `commentary` for an intermediate assistant message and `final_answer` for the final assistant message. For follow-up requests with models like `gpt-5.3-codex` and later, preserve and resend phase on all assistant messages. Omitting it can degrade performance. Not used for user messages.
      description: Delta changes in streaming response
    ChatStreamingChoice:
      type: object
      properties:
        delta:
          $ref: '#/components/schemas/ChatStreamingMessageChunk'
        finish_reason:
          anyOf:
            - $ref: '#/components/schemas/ChatCompletionFinishReason'
            - nullable: true
            - nullable: true
        index:
          type: number
          description: Choice index
        logprobs:
          $ref: '#/components/schemas/ChatMessageTokenLogprobs'
      required:
        - delta
        - finish_reason
        - index
      description: Streaming completion choice chunk
    ChatStreamingResponseChunk:
      type: object
      properties:
        id:
          type: string
          description: Unique chunk identifier
        choices:
          type: array
          items:
            $ref: '#/components/schemas/ChatStreamingChoice'
          description: List of streaming chunk choices
        created:
          type: number
          description: Unix timestamp of creation
        model:
          type: string
          description: Model used for completion
        object:
          type: string
          enum:
            - chat.completion.chunk
        system_fingerprint:
          type: string
          description: System fingerprint
        error:
          type: object
          properties:
            message:
              type: string
              description: Error message
            code:
              type: number
              description: Error code
          required:
            - message
            - code
          description: Error information
        usage:
          $ref: '#/components/schemas/ChatGenerationTokenUsage'
      required:
        - id
        - choices
        - created
        - model
        - object
      description: Streaming chat completion chunk
      x-speakeasy-entity: ChatStreamChunk
    SystemMessage:
      type: object
      properties:
        role:
          type: string
          enum:
            - system
        content:
          anyOf:
            - type: string
            - type: array
              items:
                $ref: '#/components/schemas/ChatMessageContentItemText'
          description: System message content
        name:
          type: string
          description: Optional name for the system message
      required:
        - role
        - content
      description: System message for setting behavior
    UserMessage:
      type: object
      properties:
        role:
          type: string
          enum:
            - user
        content:
          anyOf:
            - type: string
            - type: array
              items:
                $ref: '#/components/schemas/ChatMessageContentItem'
          description: User message content
        name:
          type: string
          description: Optional name for the user
      required:
        - role
        - content
      description: User message
    DeveloperMessage:
      type: object
      properties:
        role:
          type: string
          enum:
            - developer
        content:
          anyOf:
            - type: string
            - type: array
              items:
                $ref: '#/components/schemas/ChatMessageContentItemText'
          description: Developer message content
        name:
          type: string
          description: Optional name for the developer message
      required:
        - role
        - content
      description: Developer message
    ToolResponseMessage:
      type: object
      properties:
        role:
          type: string
          enum:
            - tool
        content:
          anyOf:
            - type: string
            - type: array
              items:
                $ref: '#/components/schemas/ChatMessageContentItem'
          description: Tool response content
        tool_call_id:
          type: string
          description: ID of the assistant message tool call this message responds to
      required:
        - role
        - content
        - tool_call_id
      description: Tool response message
    Message:
      oneOf:
        - $ref: '#/components/schemas/SystemMessage'
        - $ref: '#/components/schemas/UserMessage'
        - $ref: '#/components/schemas/DeveloperMessage'
        - $ref: '#/components/schemas/AssistantMessage'
        - $ref: '#/components/schemas/ToolResponseMessage'
      discriminator:
        propertyName: role
      description: Chat completion message with role-based discrimination
    ModelName:
      type: string
      description: Model to use for completion
    ModelNames:
      type: array
      items:
        allOf:
          - $ref: '#/components/schemas/ModelName'
          - description: Available OpenRouter chat completion models
      description: Models to use for completion
    ResponseFormatText:
      type: object
      properties:
        type:
          type: string
          enum:
            - text
      required:
        - type
      description: Default text response format
    ResponseFormatJSONObject:
      type: object
      properties:
        type:
          type: string
          enum:
            - json_object
      required:
        - type
      description: JSON object response format
    JSONSchemaConfig:
      type: object
      properties:
        name:
          type: string
          maxLength: 64
          description: Schema name (a-z, A-Z, 0-9, underscores, dashes, max 64 chars)
        description:
          type: string
          description: Schema description for the model
        schema:
          type: object
          additionalProperties:
            nullable: true
          description: JSON Schema object
        strict:
          type: boolean
          nullable: true
          description: Enable strict schema adherence
      required:
        - name
      description: JSON Schema configuration object
    ResponseFormatJSONSchema:
      type: object
      properties:
        type:
          type: string
          enum:
            - json_schema
        json_schema:
          $ref: '#/components/schemas/JSONSchemaConfig'
      required:
        - type
        - json_schema
      description: JSON Schema response format for structured outputs
    ResponseFormatTextGrammar:
      type: object
      properties:
        type:
          type: string
          enum:
            - grammar
        grammar:
          type: string
          description: Custom grammar for text generation
      required:
        - type
        - grammar
      description: Custom grammar response format
    ResponseFormatTextPython:
      type: object
      properties:
        type:
          type: string
          enum:
            - python
      required:
        - type
      description: Python code response format
    ChatStreamOptions:
      type: object
      nullable: true
      properties:
        include_usage:
          type: boolean
          description: 'Deprecated: This field has no effect. Full usage details are always included.'
          deprecated: true
      description: Streaming configuration options
    NamedToolChoice:
      type: object
      properties:
        type:
          type: string
          enum:
            - function
        function:
          type: object
          properties:
            name:
              type: string
              description: Function name to call
          required:
            - name
      required:
        - type
        - function
      description: Named tool choice for specific function
    ToolChoiceOption:
      anyOf:
        - type: string
          enum:
            - none
        - type: string
          enum:
            - auto
        - type: string
          enum:
            - required
        - $ref: '#/components/schemas/NamedToolChoice'
      description: Tool choice configuration
    ToolDefinitionJson:
      type: object
      properties:
        type:
          type: string
          enum:
            - function
        function:
          type: object
          properties:
            name:
              type: string
              maxLength: 64
              description: Function name (a-z, A-Z, 0-9, underscores, dashes, max 64 chars)
            description:
              type: string
              description: Function description for the model
            parameters:
              type: object
              additionalProperties:
                nullable: true
              description: Function parameters as JSON Schema object
            strict:
              type: boolean
              nullable: true
              description: Enable strict schema adherence
          required:
            - name
          description: Function definition for tool calling
        cache_control:
          $ref: '#/components/schemas/ChatMessageContentItemCacheControl'
      required:
        - type
        - function
      description: Tool definition for function calling
    DebugOptions:
      type: object
      properties:
        echo_upstream_body:
          type: boolean
          description: If true, includes the transformed upstream request body in a debug chunk at the start of the stream. Only works with streaming mode.
      description: Debug options for inspecting request transformations (streaming only)
    ChatGenerationParams:
      type: object
      properties:
        provider:
          type: object
          nullable: true
          properties:
            allow_fallbacks:
              type: boolean
              nullable: true
              description: |
                Whether to allow backup providers to serve requests
                - true: (default) when the primary provider (or your custom providers in "order") is unavailable, use the next best provider.
                - false: use only the primary/custom provider, and return the upstream error if it's unavailable.
            require_parameters:
              type: boolean
              nullable: true
              description: Whether to filter providers to only those that support the parameters you've provided. If this setting is omitted or set to false, then providers will receive only the parameters they support, and ignore the rest.
            data_collection:
              $ref: '#/components/schemas/DataCollection'
            zdr:
              type: boolean
              nullable: true
              description: Whether to restrict routing to only ZDR (Zero Data Retention) endpoints. When true, only endpoints that do not retain prompts will be used.
            enforce_distillable_text:
              type: boolean
              nullable: true
              description: Whether to restrict routing to only models that allow text distillation. When true, only models where the author has allowed distillation will be used.
            order:
              type: array
              nullable: true
              items:
                anyOf:
                  - $ref: '#/components/schemas/ProviderName'
                  - type: string
              description: An ordered list of provider slugs. The router will attempt to use the first provider in the subset of this list that supports your requested model, and fall back to the next if it is unavailable. If no providers are available, the request will fail with an error message.
            only:
              type: array
              nullable: true
              items:
                anyOf:
                  - $ref: '#/components/schemas/ProviderName'
                  - type: string
              description: List of provider slugs to allow. If provided, this list is merged with your account-wide allowed provider settings for this request.
            ignore:
              type: array
              nullable: true
              items:
                anyOf:
                  - $ref: '#/components/schemas/ProviderName'
                  - type: string
              description: List of provider slugs to ignore. If provided, this list is merged with your account-wide ignored provider settings for this request.
            quantizations:
              type: array
              nullable: true
              items:
                $ref: '#/components/schemas/Quantization'
              description: A list of quantization levels to filter the provider by.
            sort:
              allOf:
                - $ref: '#/components/schemas/ProviderSort'
                - anyOf:
                    - $ref: '#/components/schemas/ProviderSort'
                    - $ref: '#/components/schemas/ProviderSortConfig'
                    - nullable: true
                  description: The sorting strategy to use for this request, if "order" is not specified. When set, no load balancing is performed.
            max_price:
              type: object
              properties:
                prompt:
                  $ref: '#/components/schemas/BigNumberUnion'
                completion:
                  allOf:
                    - $ref: '#/components/schemas/BigNumberUnion'
                    - description: Price per million completion tokens
                image:
                  allOf:
                    - $ref: '#/components/schemas/BigNumberUnion'
                    - description: Price per image
                audio:
                  allOf:
                    - $ref: '#/components/schemas/BigNumberUnion'
                    - description: Price per audio unit
                request:
                  allOf:
                    - $ref: '#/components/schemas/BigNumberUnion'
                    - description: Price per request
              description: The object specifying the maximum price you want to pay for this request. USD price per million tokens, for prompt and completion.
            preferred_min_throughput:
              $ref: '#/components/schemas/PreferredMinThroughput'
            preferred_max_latency:
              $ref: '#/components/schemas/PreferredMaxLatency'
          additionalProperties: false
          description: When multiple model providers are available, optionally indicate your routing preference.
        plugins:
          type: array
          items:
            oneOf:
              - type: object
                properties:
                  id:
                    type: string
                    enum:
                      - auto-router
                  enabled:
                    type: boolean
                    description: Set to false to disable the auto-router plugin for this request. Defaults to true.
                  allowed_models:
                    type: array
                    items:
                      type: string
                    description: List of model patterns to filter which models the auto-router can route between. Supports wildcards (e.g., "anthropic/*" matches all Anthropic models). When not specified, uses the default supported models list.
                required:
                  - id
              - type: object
                properties:
                  id:
                    type: string
                    enum:
                      - moderation
                required:
                  - id
              - type: object
                properties:
                  id:
                    type: string
                    enum:
                      - web
                  enabled:
                    type: boolean
                    description: Set to false to disable the web-search plugin for this request. Defaults to true.
                  max_results:
                    type: number
                  search_prompt:
                    type: string
                  engine:
                    $ref: '#/components/schemas/WebSearchEngine'
                required:
                  - id
              - type: object
                properties:
                  id:
                    type: string
                    enum:
                      - file-parser
                  enabled:
                    type: boolean
                    description: Set to false to disable the file-parser plugin for this request. Defaults to true.
                  pdf:
                    $ref: '#/components/schemas/PDFParserOptions'
                required:
                  - id
              - type: object
                properties:
                  id:
                    type: string
                    enum:
                      - response-healing
                  enabled:
                    type: boolean
                    description: Set to false to disable the response-healing plugin for this request. Defaults to true.
                required:
                  - id
          description: Plugins you want to enable for this request, including their settings.
        route:
          type: string
          nullable: true
          enum:
            - fallback
            - sort
          deprecated: true
          description: '**DEPRECATED** Use providers.sort.partition instead. Backwards-compatible alias for providers.sort.partition. Accepts legacy values: "fallback" (maps to "model"), "sort" (maps to "none").'
          x-speakeasy-deprecation-message: Use providers.sort.partition instead.
          x-speakeasy-ignore: true
          x-fern-ignore: true
          x-speakeasy-unknown-values: allow
        user:
          type: string
          description: Unique user identifier
        session_id:
          type: string
          maxLength: 128
          description: A unique identifier for grouping related requests (e.g., a conversation or agent workflow) for observability. If provided in both the request body and the x-session-id header, the body value takes precedence. Maximum of 128 characters.
        trace:
          type: object
          properties:
            trace_id:
              type: string
            trace_name:
              type: string
            span_name:
              type: string
            generation_name:
              type: string
            parent_span_id:
              type: string
          additionalProperties:
            nullable: true
          description: Metadata for observability and tracing. Known keys (trace_id, trace_name, span_name, generation_name, parent_span_id) have special handling. Additional keys are passed through as custom metadata to configured broadcast destinations.
        messages:
          type: array
          items:
            $ref: '#/components/schemas/Message'
          minItems: 1
          description: List of messages for the conversation
        model:
          $ref: '#/components/schemas/ModelName'
        models:
          $ref: '#/components/schemas/ModelNames'
        frequency_penalty:
          type: number
          nullable: true
          minimum: -2
          maximum: 2
          description: Frequency penalty (-2.0 to 2.0)
        logit_bias:
          type: object
          nullable: true
          additionalProperties:
            type: number
          description: Token logit bias adjustments
        logprobs:
          type: boolean
          nullable: true
          description: Return log probabilities
        top_logprobs:
          type: number
          nullable: true
          minimum: 0
          maximum: 20
          description: Number of top log probabilities to return (0-20)
        max_completion_tokens:
          type: number
          nullable: true
          minimum: 1
          description: Maximum tokens in completion
        max_tokens:
          type: number
          nullable: true
          minimum: 1
          description: 'Maximum tokens (deprecated, use max_completion_tokens). Note: some providers enforce a minimum of 16.'
        metadata:
          type: object
          additionalProperties:
            type: string
          description: Key-value pairs for additional object information (max 16 pairs, 64 char keys, 512 char values)
        presence_penalty:
          type: number
          nullable: true
          minimum: -2
          maximum: 2
          description: Presence penalty (-2.0 to 2.0)
        reasoning:
          type: object
          properties:
            effort:
              type: string
              nullable: true
              enum:
                - xhigh
                - high
                - medium
                - low
                - minimal
                - none
              description: Constrains effort on reasoning for reasoning models
              x-speakeasy-unknown-values: allow
            summary:
              anyOf:
                - $ref: '#/components/schemas/ReasoningSummaryVerbosity'
                - nullable: true
                - nullable: true
          description: Configuration options for reasoning models
        response_format:
          oneOf:
            - $ref: '#/components/schemas/ResponseFormatText'
            - $ref: '#/components/schemas/ResponseFormatJSONObject'
            - $ref: '#/components/schemas/ResponseFormatJSONSchema'
            - $ref: '#/components/schemas/ResponseFormatTextGrammar'
            - $ref: '#/components/schemas/ResponseFormatTextPython'
          discriminator:
            propertyName: type
          description: Response format configuration
        seed:
          type: integer
          nullable: true
          description: Random seed for deterministic outputs
        stop:
          anyOf:
            - type: string
            - type: array
              items:
                type: string
              maxItems: 4
            - nullable: true
          description: Stop sequences (up to 4)
        stream:
          type: boolean
          default: false
          description: Enable streaming response
        stream_options:
          $ref: '#/components/schemas/ChatStreamOptions'
        temperature:
          type: number
          nullable: true
          minimum: 0
          maximum: 2
          default: 1
          description: Sampling temperature (0-2)
        parallel_tool_calls:
          type: boolean
          nullable: true
        tool_choice:
          $ref: '#/components/schemas/ToolChoiceOption'
        tools:
          type: array
          items:
            $ref: '#/components/schemas/ToolDefinitionJson'
          description: Available tools for function calling
        top_p:
          type: number
          nullable: true
          minimum: 0
          maximum: 1
          default: 1
          description: Nucleus sampling parameter (0-1)
        debug:
          $ref: '#/components/schemas/DebugOptions'
        image_config:
          type: object
          additionalProperties:
            anyOf:
              - type: string
              - type: number
              - type: array
                items:
                  nullable: true
          description: Provider-specific image configuration options. Keys and values vary by model/provider. See https://openrouter.ai/docs/guides/overview/multimodal/image-generation for more details.
        modalities:
          type: array
          items:
            type: string
            enum:
              - text
              - image
              - audio
            x-speakeasy-unknown-values: allow
          description: Output modalities for the response. Supported values are "text", "image", and "audio".
      required:
        - messages
      description: Chat completion request parameters
    ProviderPreferences:
      type: object
      properties:
        allow_fallbacks:
          type: boolean
          nullable: true
          description: |
            Whether to allow backup providers to serve requests
            - true: (default) when the primary provider (or your custom providers in "order") is unavailable, use the next best provider.
            - false: use only the primary/custom provider, and return the upstream error if it's unavailable.
        require_parameters:
          type: boolean
          nullable: true
          description: Whether to filter providers to only those that support the parameters you've provided. If this setting is omitted or set to false, then providers will receive only the parameters they support, and ignore the rest.
        data_collection:
          $ref: '#/components/schemas/DataCollection'
        zdr:
          type: boolean
          nullable: true
          description: Whether to restrict routing to only ZDR (Zero Data Retention) endpoints. When true, only endpoints that do not retain prompts will be used.
        enforce_distillable_text:
          type: boolean
          nullable: true
          description: Whether to restrict routing to only models that allow text distillation. When true, only models where the author has allowed distillation will be used.
        order:
          type: array
          nullable: true
          items:
            anyOf:
              - $ref: '#/components/schemas/ProviderName'
              - type: string
          description: An ordered list of provider slugs. The router will attempt to use the first provider in the subset of this list that supports your requested model, and fall back to the next if it is unavailable. If no providers are available, the request will fail with an error message.
        only:
          type: array
          nullable: true
          items:
            anyOf:
              - $ref: '#/components/schemas/ProviderName'
              - type: string
          description: List of provider slugs to allow. If provided, this list is merged with your account-wide allowed provider settings for this request.
        ignore:
          type: array
          nullable: true
          items:
            anyOf:
              - $ref: '#/components/schemas/ProviderName'
              - type: string
          description: List of provider slugs to ignore. If provided, this list is merged with your account-wide ignored provider settings for this request.
        quantizations:
          type: array
          nullable: true
          items:
            $ref: '#/components/schemas/Quantization'
          description: A list of quantization levels to filter the provider by.
        sort:
          allOf:
            - $ref: '#/components/schemas/ProviderSort'
            - anyOf:
                - $ref: '#/components/schemas/ProviderSort'
                - $ref: '#/components/schemas/ProviderSortConfig'
                - nullable: true
              description: The sorting strategy to use for this request, if "order" is not specified. When set, no load balancing is performed.
        max_price:
          type: object
          properties:
            prompt:
              $ref: '#/components/schemas/BigNumberUnion'
            completion:
              allOf:
                - $ref: '#/components/schemas/BigNumberUnion'
                - description: Price per million completion tokens
            image:
              allOf:
                - $ref: '#/components/schemas/BigNumberUnion'
                - description: Price per image
            audio:
              allOf:
                - $ref: '#/components/schemas/BigNumberUnion'
                - description: Price per audio unit
            request:
              allOf:
                - $ref: '#/components/schemas/BigNumberUnion'
                - description: Price per request
          description: The object specifying the maximum price you want to pay for this request. USD price per million tokens, for prompt and completion.
        preferred_min_throughput:
          $ref: '#/components/schemas/PreferredMinThroughput'
        preferred_max_latency:
          $ref: '#/components/schemas/PreferredMaxLatency'
      description: Provider routing preferences for the request.
  parameters:
    AppIdentifier:
      name: HTTP-Referer
      in: header
      schema:
        type: string
      description: |
        The app identifier should be your app's URL and is used as the primary identifier for rankings.
        This is used to track API usage per application.
    AppDisplayName:
      name: X-OpenRouter-Title
      in: header
      schema:
        type: string
      description: |
        The app display name allows you to customize how your app appears in OpenRouter's dashboard.
    AppCategories:
      name: X-OpenRouter-Categories
      in: header
      schema:
        type: string
      description: |
        Comma-separated list of app categories (e.g. "cli-agent,cloud-agent"). Used for marketplace rankings.
  securitySchemes:
    apiKey:
      type: http
      scheme: bearer
      description: API key as bearer token in Authorization header
    bearer:
      type: http
      scheme: bearer
      description: API key as bearer token in Authorization header
paths:
  /chat/completions:
    post:
      x-speakeasy-group: chat
      x-speakeasy-name-override: send
      x-speakeasy-stream-request-field: stream
      tags:
        - Chat
      summary: Create a chat completion
      operationId: sendChatCompletionRequest
      description: Sends a request for a model response for the given chat conversation. Supports both streaming and non-streaming modes.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatGenerationParams'
        required: true
      responses:
        '200':
          description: Successful chat completion response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatResponse'
            text/event-stream:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/ChatStreamingResponseChunk'
                required:
                  - data
              x-speakeasy-sse-sentinel: '[DONE]'
    parameters:
      - $ref: '#/components/parameters/AppIdentifier'
      - $ref: '#/components/parameters/AppDisplayName'
      - $ref: '#/components/parameters/AppCategories'
  /embeddings:
    post:
      x-speakeasy-name-override: generate
      tags:
        - Embeddings
      summary: Submit an embedding request
      description: Submits an embedding request to the embeddings router
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                input:
                  anyOf:
                    - type: string
                    - type: array
                      items:
                        type: string
                    - type: array
                      items:
                        type: number
                    - type: array
                      items:
                        type: array
                        items:
                          type: number
                    - type: array
                      items:
                        type: object
                        properties:
                          content:
                            type: array
                            items:
                              oneOf:
                                - type: object
                                  properties:
                                    type:
                                      type: string
                                      enum:
                                        - text
                                    text:
                                      type: string
                                  required:
                                    - type
                                    - text
                                - type: object
                                  properties:
                                    type:
                                      type: string
                                      enum:
                                        - image_url
                                    image_url:
                                      type: object
                                      properties:
                                        url:
                                          type: string
                                      required:
                                        - url
                                  required:
                                    - type
                                    - image_url
                        required:
                          - content
                model:
                  type: string
                encoding_format:
                  type: string
                  enum:
                    - float
                    - base64
                  x-speakeasy-unknown-values: allow
                dimensions:
                  type: integer
                  minimum: 0
                  exclusiveMinimum: true
                user:
                  type: string
                provider:
                  $ref: '#/components/schemas/ProviderPreferences'
                input_type:
                  type: string
              required:
                - input
                - model
        required: true
      responses:
        '200':
          description: Embedding response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  object:
                    type: string
                    enum:
                      - list
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        object:
                          type: string
                          enum:
                            - embedding
                        embedding:
                          anyOf:
                            - type: array
                              items:
                                type: number
                            - type: string
                        index:
                          type: number
                      required:
                        - object
                        - embedding
                  model:
                    type: string
                  usage:
                    type: object
                    properties:
                      prompt_tokens:
                        type: number
                      total_tokens:
                        type: number
                      cost:
                        type: number
                    required:
                      - prompt_tokens
                      - total_tokens
                required:
                  - object
                  - data
                  - model
            text/event-stream:
              schema:
                type: string
                description: Not used for embeddings - embeddings do not support streaming
              x-speakeasy-sse-sentinel: '[DONE]'
      operationId: createEmbeddings
    parameters:
      - $ref: '#/components/parameters/AppIdentifier'
      - $ref: '#/components/parameters/AppDisplayName'
      - $ref: '#/components/parameters/AppCategories'
tags:
  - name: API Keys
    description: API key management endpoints
  - name: Analytics
    description: Analytics and usage endpoints
  - name: Anthropic Messages
    description: Anthropic Messages endpoints
  - name: Chat
    description: Chat completion endpoints
  - name: Credits
    description: Credit management endpoints
  - name: Embeddings
    description: Text embedding endpoints
  - name: Endpoints
    description: Endpoint information
  - name: Generations
    description: Generation history endpoints
  - name: Guardrails
    description: Guardrails endpoints
  - name: Models
    description: Model information endpoints
  - name: OAuth
    description: OAuth authentication endpoints
  - name: Providers
    description: Provider information endpoints
  - name: beta.responses
    description: beta.responses endpoints
