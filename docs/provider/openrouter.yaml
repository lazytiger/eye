---
openapi: 3.1.0
info:
  title: OpenRouter API
  version: 1.0.0
  description: OpenAI-compatible API with additional OpenRouter features
  contact:
    name: OpenRouter Support
    url: "https://openrouter.ai/docs"
    email: support@openrouter.ai
  license:
    name: MIT
    url: "https://opensource.org/licenses/MIT"
servers:
  - url: "https://openrouter.ai/api/v1"
    description: Production server
    x-speakeasy-server-id: production
security:
  - apiKey: []
externalDocs:
  description: OpenRouter Documentation
  url: "https://openrouter.ai/docs"
components:
  schemas:
    OpenAIResponsesResponseStatus:
      type: string
      enum:
        - completed
        - incomplete
        - in_progress
        - failed
        - cancelled
        - queued
      x-speakeasy-unknown-values: allow
    FileCitation:
      type: object
      properties:
        type:
          type: string
          enum:
            - file_citation
        file_id:
          type: string
        filename:
          type: string
        index:
          type: number
      required:
        - type
        - file_id
        - filename
        - index
    URLCitation:
      type: object
      properties:
        type:
          type: string
          enum:
            - url_citation
        url:
          type: string
        title:
          type: string
        start_index:
          type: number
        end_index:
          type: number
      required:
        - type
        - url
        - title
        - start_index
        - end_index
    FilePath:
      type: object
      properties:
        type:
          type: string
          enum:
            - file_path
        file_id:
          type: string
        index:
          type: number
      required:
        - type
        - file_id
        - index
    OpenAIResponsesAnnotation:
      anyOf:
        - $ref: "#/components/schemas/FileCitation"
        - $ref: "#/components/schemas/URLCitation"
        - $ref: "#/components/schemas/FilePath"
    ResponseOutputText:
      type: object
      properties:
        type:
          type: string
          enum:
            - output_text
        text:
          type: string
        annotations:
          type: array
          items:
            $ref: "#/components/schemas/OpenAIResponsesAnnotation"
        logprobs:
          type: array
          items:
            type: object
            properties:
              token:
                type: string
              bytes:
                type: array
                items:
                  type: number
              logprob:
                type: number
              top_logprobs:
                type: array
                items:
                  type: object
                  properties:
                    token:
                      type: string
                    bytes:
                      type: array
                      items:
                        type: number
                    logprob:
                      type: number
                  required:
                    - token
                    - bytes
                    - logprob
            required:
              - token
              - bytes
              - logprob
              - top_logprobs
      required:
        - type
        - text
    OpenAIResponsesRefusalContent:
      type: object
      properties:
        type:
          type: string
          enum:
            - refusal
        refusal:
          type: string
      required:
        - type
        - refusal
    OutputMessage:
      type: object
      properties:
        id:
          type: string
        role:
          type: string
          enum:
            - assistant
        type:
          type: string
          enum:
            - message
        status:
          anyOf:
            - type: string
              enum:
                - completed
            - type: string
              enum:
                - incomplete
            - type: string
              enum:
                - in_progress
        content:
          type: array
          items:
            anyOf:
              - $ref: "#/components/schemas/ResponseOutputText"
              - $ref: "#/components/schemas/OpenAIResponsesRefusalContent"
        phase:
          anyOf:
            - type: string
              enum:
                - commentary
            - type: string
              enum:
                - final_answer
            - nullable: true
          description: "The phase of an assistant message. Use `commentary` for an intermediate assistant message and `final_answer` for the final assistant message. For follow-up requests with models like `gpt-5.3-codex` and later, preserve and resend phase on all assistant messages. Omitting it can degrade performance. Not used for user messages."
      required:
        - id
        - role
        - type
        - content
    ResponsesOutputMessage:
      allOf:
        - $ref: "#/components/schemas/OutputMessage"
        - type: object
          properties: {}
      description: An output message item
    ReasoningTextContent:
      type: object
      properties:
        type:
          type: string
          enum:
            - reasoning_text
        text:
          type: string
      required:
        - type
        - text
    ReasoningSummaryText:
      type: object
      properties:
        type:
          type: string
          enum:
            - summary_text
        text:
          type: string
      required:
        - type
        - text
    OutputItemReasoning:
      type: object
      properties:
        type:
          type: string
          enum:
            - reasoning
        id:
          type: string
        content:
          type: array
          items:
            $ref: "#/components/schemas/ReasoningTextContent"
        summary:
          type: array
          items:
            $ref: "#/components/schemas/ReasoningSummaryText"
        encrypted_content:
          type: string
          nullable: true
        status:
          anyOf:
            - type: string
              enum:
                - completed
            - type: string
              enum:
                - incomplete
            - type: string
              enum:
                - in_progress
      required:
        - type
        - id
        - summary
    ResponsesOutputItemReasoning:
      allOf:
        - $ref: "#/components/schemas/OutputItemReasoning"
        - type: object
          properties:
            content:
              type: array
              nullable: true
              items:
                $ref: "#/components/schemas/ReasoningTextContent"
            signature:
              type: string
              nullable: true
              description: "A signature for the reasoning content, used for verification"
            format:
              type: string
              nullable: true
              enum:
                - unknown
                - openai-responses-v1
                - azure-openai-responses-v1
                - xai-responses-v1
                - anthropic-claude-v1
                - google-gemini-v1
              description: The format of the reasoning content
              x-speakeasy-unknown-values: allow
      description: An output item containing reasoning
    OutputItemFunctionCall:
      type: object
      properties:
        type:
          type: string
          enum:
            - function_call
        id:
          type: string
        name:
          type: string
        arguments:
          type: string
        call_id:
          type: string
        status:
          anyOf:
            - type: string
              enum:
                - completed
            - type: string
              enum:
                - incomplete
            - type: string
              enum:
                - in_progress
      required:
        - type
        - name
        - arguments
        - call_id
    ResponsesOutputItemFunctionCall:
      allOf:
        - $ref: "#/components/schemas/OutputItemFunctionCall"
        - type: object
          properties: {}
    WebSearchStatus:
      type: string
      enum:
        - completed
        - searching
        - in_progress
        - failed
      x-speakeasy-unknown-values: allow
    OutputItemWebSearchCall:
      type: object
      properties:
        type:
          type: string
          enum:
            - web_search_call
        id:
          type: string
        action:
          oneOf:
            - type: object
              properties:
                type:
                  type: string
                  enum:
                    - search
                query:
                  type: string
                queries:
                  type: array
                  items:
                    type: string
                sources:
                  type: array
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                        enum:
                          - url
                      url:
                        type: string
                    required:
                      - type
                      - url
              required:
                - type
                - query
            - type: object
              properties:
                type:
                  type: string
                  enum:
                    - open_page
                url:
                  type: string
                  nullable: true
              required:
                - type
            - type: object
              properties:
                type:
                  type: string
                  enum:
                    - find_in_page
                pattern:
                  type: string
                url:
                  type: string
              required:
                - type
                - pattern
                - url
        status:
          $ref: "#/components/schemas/WebSearchStatus"
      required:
        - type
        - id
        - action
        - status
    ResponsesWebSearchCallOutput:
      allOf:
        - $ref: "#/components/schemas/OutputItemWebSearchCall"
        - type: object
          properties: {}
    OutputItemFileSearchCall:
      type: object
      properties:
        type:
          type: string
          enum:
            - file_search_call
        id:
          type: string
        queries:
          type: array
          items:
            type: string
        status:
          $ref: "#/components/schemas/WebSearchStatus"
      required:
        - type
        - id
        - queries
        - status
    ResponsesOutputItemFileSearchCall:
      allOf:
        - $ref: "#/components/schemas/OutputItemFileSearchCall"
        - type: object
          properties: {}
    ImageGenerationStatus:
      type: string
      enum:
        - in_progress
        - completed
        - generating
        - failed
      x-speakeasy-unknown-values: allow
    OutputItemImageGenerationCall:
      type: object
      properties:
        type:
          type: string
          enum:
            - image_generation_call
        id:
          type: string
        result:
          type: string
          nullable: true
          default: ~
        status:
          $ref: "#/components/schemas/ImageGenerationStatus"
      required:
        - type
        - id
        - status
    ResponsesImageGenerationCall:
      allOf:
        - $ref: "#/components/schemas/OutputItemImageGenerationCall"
        - type: object
          properties: {}
    ResponsesOutputItem:
      anyOf:
        - $ref: "#/components/schemas/ResponsesOutputMessage"
        - $ref: "#/components/schemas/ResponsesOutputItemReasoning"
        - $ref: "#/components/schemas/ResponsesOutputItemFunctionCall"
        - $ref: "#/components/schemas/ResponsesWebSearchCallOutput"
        - $ref: "#/components/schemas/ResponsesOutputItemFileSearchCall"
        - $ref: "#/components/schemas/ResponsesImageGenerationCall"
      description: An output item from the response
    ResponsesErrorField:
      type: object
      nullable: true
      properties:
        code:
          type: string
          enum:
            - server_error
            - rate_limit_exceeded
            - invalid_prompt
            - vector_store_timeout
            - invalid_image
            - invalid_image_format
            - invalid_base64_image
            - invalid_image_url
            - image_too_large
            - image_too_small
            - image_parse_error
            - image_content_policy_violation
            - invalid_image_mode
            - image_file_too_large
            - unsupported_image_media_type
            - empty_image_file
            - failed_to_download_image
            - image_file_not_found
          x-speakeasy-unknown-values: allow
        message:
          type: string
      required:
        - code
        - message
      description: Error information returned from the API
    OpenAIResponsesIncompleteDetails:
      type: object
      nullable: true
      properties:
        reason:
          type: string
          enum:
            - max_output_tokens
            - content_filter
          x-speakeasy-unknown-values: allow
    OpenAIResponsesUsage:
      type: object
      properties:
        input_tokens:
          type: number
        input_tokens_details:
          type: object
          properties:
            cached_tokens:
              type: number
          required:
            - cached_tokens
        output_tokens:
          type: number
        output_tokens_details:
          type: object
          properties:
            reasoning_tokens:
              type: number
          required:
            - reasoning_tokens
        total_tokens:
          type: number
      required:
        - input_tokens
        - input_tokens_details
        - output_tokens
        - output_tokens_details
        - total_tokens
    OpenResponsesUsage:
      allOf:
        - $ref: "#/components/schemas/OpenAIResponsesUsage"
        - type: object
          nullable: true
          properties:
            cost:
              type: number
              nullable: true
              description: Cost of the completion
            is_byok:
              type: boolean
              description: Whether a request was made using a Bring Your Own Key configuration
            cost_details:
              type: object
              properties:
                upstream_inference_cost:
                  type: number
                  nullable: true
                upstream_inference_input_cost:
                  type: number
                upstream_inference_output_cost:
                  type: number
              required:
                - upstream_inference_input_cost
                - upstream_inference_output_cost
      description: Token usage information for the response
    ResponseInputText:
      type: object
      properties:
        type:
          type: string
          enum:
            - input_text
        text:
          type: string
      required:
        - type
        - text
      description: Text input content item
    ResponseInputImage:
      type: object
      properties:
        type:
          type: string
          enum:
            - input_image
        detail:
          type: string
          enum:
            - auto
            - high
            - low
          x-speakeasy-unknown-values: allow
        image_url:
          type: string
          nullable: true
      required:
        - type
        - detail
      description: Image input content item
    ResponseInputFile:
      type: object
      properties:
        type:
          type: string
          enum:
            - input_file
        file_id:
          type: string
          nullable: true
        file_data:
          type: string
        filename:
          type: string
        file_url:
          type: string
      required:
        - type
      description: File input content item
    ResponseInputAudio:
      type: object
      properties:
        type:
          type: string
          enum:
            - input_audio
        input_audio:
          type: object
          properties:
            data:
              type: string
            format:
              type: string
              enum:
                - mp3
                - wav
              x-speakeasy-unknown-values: allow
          required:
            - data
            - format
      required:
        - type
        - input_audio
      description: Audio input content item
    ToolCallStatus:
      type: string
      nullable: true
      enum:
        - in_progress
        - completed
        - incomplete
      x-speakeasy-unknown-values: allow
    OpenAIResponsesInput:
      anyOf:
        - type: string
        - type: array
          items:
            anyOf:
              - type: object
                properties:
                  type:
                    type: string
                    enum:
                      - message
                  role:
                    anyOf:
                      - type: string
                        enum:
                          - user
                      - type: string
                        enum:
                          - system
                      - type: string
                        enum:
                          - assistant
                      - type: string
                        enum:
                          - developer
                  content:
                    anyOf:
                      - type: array
                        items:
                          oneOf:
                            - $ref: "#/components/schemas/ResponseInputText"
                            - $ref: "#/components/schemas/ResponseInputImage"
                            - $ref: "#/components/schemas/ResponseInputFile"
                            - $ref: "#/components/schemas/ResponseInputAudio"
                          discriminator:
                            propertyName: type
                            mapping:
                              input_text: "#/components/schemas/ResponseInputText"
                              input_image: "#/components/schemas/ResponseInputImage"
                              input_file: "#/components/schemas/ResponseInputFile"
                              input_audio: "#/components/schemas/ResponseInputAudio"
                      - type: string
                  phase:
                    anyOf:
                      - type: string
                        enum:
                          - commentary
                      - type: string
                        enum:
                          - final_answer
                      - nullable: true
                required:
                  - role
                  - content
              - type: object
                properties:
                  id:
                    type: string
                  type:
                    type: string
                    enum:
                      - message
                  role:
                    anyOf:
                      - type: string
                        enum:
                          - user
                      - type: string
                        enum:
                          - system
                      - type: string
                        enum:
                          - developer
                  content:
                    type: array
                    items:
                      oneOf:
                        - $ref: "#/components/schemas/ResponseInputText"
                        - $ref: "#/components/schemas/ResponseInputImage"
                        - $ref: "#/components/schemas/ResponseInputFile"
                        - $ref: "#/components/schemas/ResponseInputAudio"
                      discriminator:
                        propertyName: type
                        mapping:
                          input_text: "#/components/schemas/ResponseInputText"
                          input_image: "#/components/schemas/ResponseInputImage"
                          input_file: "#/components/schemas/ResponseInputFile"
                          input_audio: "#/components/schemas/ResponseInputAudio"
                required:
                  - id
                  - role
                  - content
              - type: object
                properties:
                  type:
                    type: string
                    enum:
                      - function_call_output
                  id:
                    type: string
                    nullable: true
                  call_id:
                    type: string
                  output:
                    type: string
                  status:
                    $ref: "#/components/schemas/ToolCallStatus"
                required:
                  - type
                  - call_id
                  - output
              - type: object
                properties:
                  type:
                    type: string
                    enum:
                      - function_call
                  call_id:
                    type: string
                  name:
                    type: string
                  arguments:
                    type: string
                  id:
                    type: string
                  status:
                    $ref: "#/components/schemas/ToolCallStatus"
                required:
                  - type
                  - call_id
                  - name
                  - arguments
              - $ref: "#/components/schemas/OutputItemImageGenerationCall"
              - $ref: "#/components/schemas/OutputMessage"
        - nullable: true
    OpenResponsesRequestMetadata:
      type: object
      nullable: true
      additionalProperties:
        type: string
        maxLength: 512
      description: Metadata key-value pairs for the request. Keys must be ≤64 characters and cannot contain brackets. Values must be ≤512 characters. Maximum 16 pairs allowed.
    OpenResponsesFunctionTool:
      type: object
      properties:
        type:
          type: string
          enum:
            - function
        name:
          type: string
        description:
          type: string
          nullable: true
        strict:
          type: boolean
          nullable: true
        parameters:
          type: object
          nullable: true
          additionalProperties:
            nullable: true
      required:
        - type
        - name
        - parameters
      description: Function tool definition
    ResponsesSearchContextSize:
      type: string
      enum:
        - low
        - medium
        - high
      description: Size of the search context for web search tools
      x-speakeasy-unknown-values: allow
    WebSearchPreviewToolUserLocation:
      type: object
      nullable: true
      properties:
        type:
          type: string
          enum:
            - approximate
        city:
          type: string
          nullable: true
        country:
          type: string
          nullable: true
        region:
          type: string
          nullable: true
        timezone:
          type: string
          nullable: true
      required:
        - type
    OpenResponsesWebSearchPreviewTool:
      type: object
      properties:
        type:
          type: string
          enum:
            - web_search_preview
        search_context_size:
          $ref: "#/components/schemas/ResponsesSearchContextSize"
        user_location:
          $ref: "#/components/schemas/WebSearchPreviewToolUserLocation"
      required:
        - type
      description: Web search preview tool configuration
    OpenResponsesWebSearchPreview20250311Tool:
      type: object
      properties:
        type:
          type: string
          enum:
            - web_search_preview_2025_03_11
        search_context_size:
          $ref: "#/components/schemas/ResponsesSearchContextSize"
        user_location:
          $ref: "#/components/schemas/WebSearchPreviewToolUserLocation"
      required:
        - type
      description: Web search preview tool configuration (2025-03-11 version)
    ResponsesWebSearchUserLocation:
      type: object
      nullable: true
      properties:
        type:
          type: string
          enum:
            - approximate
        city:
          type: string
          nullable: true
        country:
          type: string
          nullable: true
        region:
          type: string
          nullable: true
        timezone:
          type: string
          nullable: true
      description: User location information for web search
    OpenResponsesWebSearchTool:
      type: object
      properties:
        type:
          type: string
          enum:
            - web_search
        filters:
          type: object
          nullable: true
          properties:
            allowed_domains:
              type: array
              nullable: true
              items:
                type: string
        search_context_size:
          $ref: "#/components/schemas/ResponsesSearchContextSize"
        user_location:
          $ref: "#/components/schemas/ResponsesWebSearchUserLocation"
      required:
        - type
      description: Web search tool configuration
    OpenResponsesWebSearch20250826Tool:
      type: object
      properties:
        type:
          type: string
          enum:
            - web_search_2025_08_26
        filters:
          type: object
          nullable: true
          properties:
            allowed_domains:
              type: array
              nullable: true
              items:
                type: string
        search_context_size:
          $ref: "#/components/schemas/ResponsesSearchContextSize"
        user_location:
          $ref: "#/components/schemas/ResponsesWebSearchUserLocation"
      required:
        - type
      description: Web search tool configuration (2025-08-26 version)
    CompoundFilter:
      type: object
      properties:
        type:
          type: string
          enum:
            - and
            - or
          x-speakeasy-unknown-values: allow
        filters:
          type: array
          items:
            type: object
            additionalProperties:
              nullable: true
      required:
        - type
        - filters
      description: A compound filter that combines multiple comparison or compound filters
    OpenResponsesFileSearchTool:
      type: object
      properties:
        type:
          type: string
          enum:
            - file_search
        vector_store_ids:
          type: array
          items:
            type: string
        filters:
          anyOf:
            - type: object
              properties:
                key:
                  type: string
                type:
                  type: string
                  enum:
                    - eq
                    - ne
                    - gt
                    - gte
                    - lt
                    - lte
                  x-speakeasy-unknown-values: allow
                value:
                  anyOf:
                    - type: string
                    - type: number
                    - type: boolean
                    - type: array
                      items:
                        anyOf:
                          - type: string
                          - type: number
              required:
                - key
                - type
                - value
            - $ref: "#/components/schemas/CompoundFilter"
            - nullable: true
        max_num_results:
          type: integer
          minimum: 1
          maximum: 50
        ranking_options:
          type: object
          properties:
            ranker:
              type: string
              enum:
                - auto
                - default-2024-11-15
              x-speakeasy-unknown-values: allow
            score_threshold:
              type: number
      required:
        - type
        - vector_store_ids
      description: File search tool configuration
    OpenResponsesComputerTool:
      type: object
      properties:
        type:
          type: string
          enum:
            - computer_use_preview
        display_height:
          type: number
        display_width:
          type: number
        environment:
          type: string
          enum:
            - windows
            - mac
            - linux
            - ubuntu
            - browser
          x-speakeasy-unknown-values: allow
      required:
        - type
        - display_height
        - display_width
        - environment
      description: Computer use preview tool configuration
    OpenResponsesCodeInterpreterTool:
      type: object
      properties:
        type:
          type: string
          enum:
            - code_interpreter
        container:
          anyOf:
            - type: string
            - type: object
              properties:
                type:
                  type: string
                  enum:
                    - auto
                file_ids:
                  type: array
                  items:
                    type: string
                memory_limit:
                  type: string
                  nullable: true
                  enum:
                    - 1g
                    - 4g
                    - 16g
                    - 64g
                  x-speakeasy-unknown-values: allow
              required:
                - type
      required:
        - type
        - container
      description: Code interpreter tool configuration
    OpenResponsesMcpTool:
      type: object
      properties:
        type:
          type: string
          enum:
            - mcp
        server_label:
          type: string
        allowed_tools:
          anyOf:
            - type: array
              items:
                type: string
            - type: object
              properties:
                tool_names:
                  type: array
                  items:
                    type: string
                read_only:
                  type: boolean
            - nullable: true
            - nullable: true
        authorization:
          type: string
        connector_id:
          type: string
          enum:
            - connector_dropbox
            - connector_gmail
            - connector_googlecalendar
            - connector_googledrive
            - connector_microsoftteams
            - connector_outlookcalendar
            - connector_outlookemail
            - connector_sharepoint
          x-speakeasy-unknown-values: allow
        headers:
          type: object
          nullable: true
          additionalProperties:
            type: string
        require_approval:
          anyOf:
            - type: object
              properties:
                never:
                  type: object
                  properties:
                    tool_names:
                      type: array
                      items:
                        type: string
                always:
                  type: object
                  properties:
                    tool_names:
                      type: array
                      items:
                        type: string
            - type: string
