name: Build Monitor

on:
  schedule:
    # 每天午夜12点运行 (UTC时间)
    - cron: '0 0 * * *'
  workflow_dispatch:  # 允许手动触发

env:
  CARGO_TERM_COLOR: always

jobs:
  monitor-builds:
    name: Monitor Build Results
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    
    - name: Install dependencies
      run: npm install @actions/core @actions/github octokit
    
    - name: Query recent workflow runs
      id: query-runs
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        GITHUB_REPOSITORY: ${{ github.repository }}
      run: |
        node << 'EOF'
        const { Octokit } = require('octokit');
        const core = require('@actions/core');
        
        const octokit = new Octokit({ auth: process.env.GITHUB_TOKEN });
        const [owner, repo] = process.env.GITHUB_REPOSITORY.split('/');
        
        try {
          // 查询最近24小时的工作流运行
          const since = new Date();
          since.setDate(since.getDate() - 1);
          
          const response = await octokit.rest.actions.listWorkflowRunsForRepo({
            owner,
            repo,
            per_page: 50,
            created: `>=${since.toISOString()}`
          });
          
          const runs = response.data.workflow_runs;
          
          // 按工作流分组
          const workflows = {
            'ci.yml': { name: 'CI', runs: [] },
            'release.yml': { name: 'Release', runs: [] },
            'dependabot.yml': { name: 'Dependabot', runs: [] },
            'build-monitor.yml': { name: 'Build Monitor', runs: [] }
          };
          
          runs.forEach(run => {
            const workflowFile = run.path.split('/').pop();
            if (workflows[workflowFile]) {
              workflows[workflowFile].runs.push({
                id: run.id,
                name: run.name,
                status: run.status,
                conclusion: run.conclusion,
                html_url: run.html_url,
                created_at: run.created_at,
                updated_at: run.updated_at
              });
            }
          });
          
          // 分析结果
          const results = {};
          let hasFailures = false;
          let hasInProgress = false;
          
          for (const [workflowFile, data] of Object.entries(workflows)) {
            if (data.runs.length > 0) {
              const latestRun = data.runs[0];
              results[workflowFile] = {
                name: data.name,
                latest_status: latestRun.status,
                latest_conclusion: latestRun.conclusion,
                latest_url: latestRun.html_url,
                total_runs: data.runs.length,
                failed_runs: data.runs.filter(r => r.conclusion === 'failure').length,
                in_progress_runs: data.runs.filter(r => r.status !== 'completed').length
              };
              
              if (latestRun.conclusion === 'failure') {
                hasFailures = true;
              }
              if (latestRun.status !== 'completed') {
                hasInProgress = true;
              }
            }
          }
          
          // 设置输出
          core.setOutput('has_failures', hasFailures);
          core.setOutput('has_in_progress', hasInProgress);
          core.setOutput('results_json', JSON.stringify(results));
          
          console.log('Build Monitor Results:');
          console.log(JSON.stringify(results, null, 2));
          
        } catch (error) {
          core.setFailed(`Failed to query workflow runs: ${error.message}`);
        }
        EOF
    
    - name: Create issue for failed builds
      if: steps.query-runs.outputs.has_failures == 'true'
      uses: actions/github-script@v7
      env:
        RESULTS_JSON: ${{ steps.query-runs.outputs.results_json }}
      with:
        script: |
          const results = JSON.parse(process.env.RESULTS_JSON);
          
          // 构建issue内容
          let issueBody = '# 🚨 Build Failures Detected\n\n';
          issueBody += 'The following workflows have failed in the last 24 hours:\n\n';
          
          for (const [workflowFile, data] of Object.entries(results)) {
            if (data.latest_conclusion === 'failure') {
              issueBody += `## ${data.name}\n`;
              issueBody += `- **Status**: ${data.latest_conclusion}\n`;
              issueBody += `- **Failed Runs**: ${data.failed_runs}\n`;
              issueBody += `- **Latest Run**: [View Details](${data.latest_url})\n\n`;
            }
          }
          
          issueBody += '---\n';
          issueBody += '*This issue was automatically generated by the Build Monitor workflow.*\n';
          
          // 检查是否已存在相同issue
          const { data: issues } = await github.rest.issues.listForRepo({
            owner: context.repo.owner,
            repo: context.repo.repo,
            state: 'open',
            labels: ['build-failure', 'automated']
          });
          
          const existingIssue = issues.find(issue => 
            issue.title.includes('Build Failures Detected') &&
            issue.created_at > new Date(Date.now() - 24 * 60 * 60 * 1000).toISOString()
          );
          
          if (!existingIssue) {
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🚨 Build Failures Detected',
              body: issueBody,
              labels: ['build-failure', 'automated', 'ci']
            });
            console.log('Created new issue for build failures');
          } else {
            console.log('Issue for build failures already exists');
          }
    
    - name: Send summary notification
      if: always()
      env:
        RESULTS_JSON: ${{ steps.query-runs.outputs.results_json }}
      run: |
        node << 'EOF'
        const results = JSON.parse(process.env.RESULTS_JSON);
        
        console.log('📊 Build Monitor Summary');
        console.log('=======================');
        
        let totalRuns = 0;
        let failedRuns = 0;
        let successRuns = 0;
        let inProgressRuns = 0;
        
        for (const [workflowFile, data] of Object.entries(results)) {
          console.log(`\n${data.name}:`);
          console.log(`  Status: ${data.latest_conclusion || data.latest_status}`);
          console.log(`  Total Runs: ${data.total_runs}`);
          console.log(`  Failed: ${data.failed_runs}`);
          console.log(`  In Progress: ${data.in_progress_runs}`);
          console.log(`  Latest: ${data.latest_url}`);
          
          totalRuns += data.total_runs;
          failedRuns += data.failed_runs;
          inProgressRuns += data.in_progress_runs;
          successRuns += data.total_runs - data.failed_runs - data.in_progress_runs;
        }
        
        console.log('\n📈 Overall Statistics:');
        console.log(`  Total Runs: ${totalRuns}`);
        console.log(`  Successful: ${successRuns}`);
        console.log(`  Failed: ${failedRuns}`);
        console.log(`  In Progress: ${inProgressRuns}`);
        
        if (failedRuns > 0) {
          console.log('\n❌ Action Required: Some builds have failed!');
          process.exitCode = 1;
        } else if (inProgressRuns > 0) {
          console.log('\n⏳ Note: Some builds are still in progress');
        } else {
          console.log('\n✅ All builds completed successfully!');
        }
        EOF
    
    - name: Update README with build status
      if: always()
      env:
        RESULTS_JSON: ${{ steps.query-runs.outputs.results_json }}
      run: |
        node << 'EOF'
        const fs = require('fs');
        const path = require('path');
        const results = JSON.parse(process.env.RESULTS_JSON);
        
        const readmePath = path.join(process.env.GITHUB_WORKSPACE, 'README.md');
        let readmeContent = fs.readFileSync(readmePath, 'utf8');
        
        // 移除现有的构建状态部分（如果有）
        const buildStatusRegex = /## 📊 Build Status[\s\S]*?(?=## |$)/;
        readmeContent = readmeContent.replace(buildStatusRegex, '');
        
        // 添加新的构建状态部分
        const buildStatusSection = `
## 📊 Build Status

Last updated: ${new Date().toISOString()}

| Workflow | Status | Latest Run |
|----------|--------|------------|
${
  Object.entries(results).map(([workflowFile, data]) => {
    const statusEmoji = data.latest_conclusion === 'success' ? '✅' : 
                       data.latest_conclusion === 'failure' ? '❌' : 
                       data.latest_status === 'in_progress' ? '⏳' : '❓';
    return `| ${data.name} | ${statusEmoji} ${data.latest_conclusion || data.latest_status} | [View](${data.latest_url}) |`;
  }).join('\n')
}

> *This section is automatically updated by the Build Monitor workflow.*
`;
        
        // 插入到README的开头部分（在第一个##之后）
        const firstHeaderIndex = readmeContent.indexOf('##');
        if (firstHeaderIndex !== -1) {
          const before = readmeContent.substring(0, firstHeaderIndex);
          const after = readmeContent.substring(firstHeaderIndex);
          readmeContent = before + buildStatusSection + '\n\n' + after;
        } else {
          readmeContent = buildStatusSection + '\n\n' + readmeContent;
        }
        
        fs.writeFileSync(readmePath, readmeContent);
        console.log('Updated README with build status');
        EOF